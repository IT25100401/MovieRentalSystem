<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETRENTAL - Movie Rental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div style="display: none;" aria-hidden="true">
        <input type="text" name="fake_username_autofill" autocomplete="username">
        <input type="password" name="fake_password_autofill" autocomplete="current-password">
    </div>

    <nav class="navbar">
        <h1 class="logo" onclick="navigateTo('home')" style="cursor: pointer;">NETRENTAL</h1>
        <div class="nav-links">
            <a href="#" onclick="navigateTo('home')">Home</a>
            <a href="#" onclick="navigateTo('movies')">Movies</a>
            <a href="#" onclick="event.preventDefault(); navigateTo('cart')" id="cartLink">Cart (0)</a>
            <a href="#" id="profileLink" style="display: none;" onclick="event.preventDefault(); loadProfile()">Profile</a>
            <a href="#" id="watchlistLink" style="display: none;" onclick="event.preventDefault(); loadWatchlist()">Watchlist</a>
            <a href="#" id="transactionsLink" style="display: none;" onclick="event.preventDefault(); loadTransactions()">Transactions</a>
            <a href="#" id="adminLink" style="display: none;" onclick="event.preventDefault(); navigateTo('admin')">Admin</a>
            <button id="loginBtn" onclick="showModal('loginModal')">Login</button>
            <button id="registerBtn" onclick="showModal('registerModal')">Register</button>
            <button id="logoutBtn" style="display: none;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- MEMBER 2: Movie Catalog Management -->
    <!-- HOME PAGE -->
    <div id="page-home" class="page active-page">
        <header class="hero">
            <div class="hero-content">
                <h2>Unlimited Movies</h2>
                <p>Rent anywhere. Watch anytime.</p>
                <div class="search-container">
                    <input type="search" id="homeSearch" class="search-bar" autocomplete="off" placeholder="Search for movies..." onkeyup="handleSearch('home')">
                </div>
            </div>
        </header>
        <main class="container">
            <h3>Trending Now</h3>
            <div class="movie-row" id="trendingMoviesRow"></div>
        </main>
    </div>

    <!-- MEMBER 2: Movie Catalog Management -->
    <!-- MOVIES PAGE -->
    <div id="page-movies" class="page">
        <main class="container" style="padding-top: 100px;">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2>All Movies</h2>
            <div style="margin-bottom: 20px;">
                <input type="search" id="moviesSearch" class="search-bar-dark" autocomplete="off" placeholder="Search all movies..." onkeyup="handleSearch('movies')">
            </div>
            <div class="movie-grid" id="allMoviesGrid"></div>
        </main>
    </div>

    <!-- MEMBER 2: Movie Catalog Management -->
    <!-- MOVIE DETAILS PAGE -->
    <div id="page-details" class="page">
        <main class="container" style="padding-top: 100px;">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <div class="details-container">
                <img id="detailImage" src="" alt="Movie Poster" class="detail-poster">
                <div class="detail-info">
                    <h1 id="detailTitle" style="font-size: 3rem; margin-bottom: 10px;"></h1>
                    <p class="detail-meta" style="color: #aaa; margin-bottom: 20px; font-size: 1.2rem;"><span id="detailGenre"></span> | <span id="detailYear"></span></p>
                    <h2 class="detail-price" style="margin-bottom: 30px;">$<span id="detailPrice"></span></h2>
                    
                    <div class="action-buttons">
                        <button class="rent-btn" onclick="goToTransaction(false)">Rent Now</button>
                        <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
                        <button id="watchlistBtn" class="cart-btn" onclick="addToWatchlist()" style="background:#f5b50a; border:none; color:black;">Add to Watchlist</button>
                    </div>

                    <hr class="divider">
                    
                    <!-- MEMBER 4: Movie Review & Feedback -->
                    <h3>Reviews</h3>
                    <div class="review-form">
                        <div class="star-rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="reviewRating" value="0">
                        <textarea id="reviewComment" placeholder="Write your review here..." class="pay-input" style="height: 80px; resize: none;"></textarea>
                        <button onclick="submitReview()" class="rent-btn" style="margin-top: 10px;">Submit Review</button>
                    </div>
                    <div id="reviewSection" class="review-list"></div>
                </div>
            </div>
        </main>
    </div>


    <!-- MEMBER 2: Movie Catalog Management -->
    <!-- ADMIN PAGE -->
    <div id="page-admin" class="page">
        <main class="container" style="padding-top: 100px;">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2>Admin Dashboard - Inventory</h2>
            <div style="display:flex; gap: 40px; margin-top:20px;">
                <div class="admin-panel transaction-box" style="flex: 1; margin: 0; max-width: none;">
                    <h3 style="margin-bottom: 20px;">Add New Movie</h3>
                    <input type="text" id="addTitle" placeholder="Movie Title" class="pay-input">
                    <input type="text" id="addGenre" placeholder="Genre (e.g. Action, Comedy)" class="pay-input">
                    <input type="number" id="addYear" placeholder="Release Year" class="pay-input">
                    <input type="number" id="addPrice" placeholder="Rental Price ($)" class="pay-input">
                    <input type="text" id="addImage" placeholder="Poster Image URL" class="pay-input">
                    <button onclick="addMovie()" class="rent-btn" style="width: 100%; margin-top: 15px;">Publish Movie</button>
                </div>
                <div class="admin-panel transaction-box" style="flex: 2; margin: 0; max-width: none; max-height: 600px; overflow-y: auto;">
                    <h3 style="margin-bottom: 20px;">Manage Catalog (Edit/Delete)</h3>
                    <div id="adminMoviesList"></div>
                </div>
            </div>
 <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>Register</h2>
            <input type="text" id="regUsername" placeholder="Username" required class="pay-input">
            <input type="email" id="regEmail" placeholder="Email" required class="pay-input">
            <input type="password" id="regPassword" placeholder="Password" required class="pay-input">
            <button onclick="register()" class="rent-btn" style="width: 100%;">Sign Up</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
